services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: salary_app
      POSTGRES_PASSWORD: salary_app
      POSTGRES_DB: salary_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salary_app -d salary_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql://salary_app:salary_app@postgres:5432/salary_management
      CORS_ORIGINS: '["http://localhost:3000"]'
      SQL_ECHO: "false"
      SEED_EMPLOYEE_COUNT: "10000"
      SEED_RANDOM_SEED: "2026"
      SEED_BATCH_SIZE: "1000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
