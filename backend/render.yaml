services:
  - type: web
    name: salary-management-api
    runtime: python
    rootDir: backend
    buildCommand: uv sync --frozen --no-dev
    startCommand: uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: SQL_ECHO
        value: "false"
      - key: PYTHON_VERSION
        value: 3.12.7
